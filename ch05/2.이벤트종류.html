<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2.이벤트종류</title>
    <!--
        날짜 : 2024/02/07
        이름 : 김철학
        내용 : 자바스크립트 이벤트 종류 실습하기
    -->
    <style>
        html {
            width: 100%;
            height: 2000px;
        }

        #content1 > p:nth-child(2) {
            position: fixed;
            right: 40px;
            top: 40px;
        }
    </style>
    <script>
        console.log('here1...');  


        // 윈도우 로드 이벤트 : HTML 문서 로드가 끝난 후 실행되는 이벤트
        window.onload = function(){
            console.log('here2...');

            // 모든 태그요소가 로드 된 후 문서객체 생성 가능 
            const btnTop = document.getElementById('btnTop');

            btnTop.onclick = function(){
                alert('클릭!');
            };
        }

        // 윈도우 리사이즈 이벤트 : 브라우저 창 크기가 바뀔때 실행되는 이벤트
        window.onresize = function(){
            console.log('resize!!!');

            let w = this.innerWidth;
            let h = this.innerHeight;

            const content1 = document.getElementById('content1');
            const spans = content1.getElementsByTagName('span');
            spans[0].innerText = w;
            spans[1].innerText = h;

        }

    </script>

</head>
<body>
    <h3>2.이벤트 종류</h3>

    <h4>문서 이벤트</h4>
    <div id="content1">
        <p>
            가로 : <span>0</span>
            세로 : <span>0</span>
        </p>
        <p>
            위치 : <span>0</span>
            <button id="btnTop">상단이동</button>
        </p>
    </div>



    <h4>마우스 이벤트</h4>
    <h4>키보드 이벤트</h4>
    <h4>폼 이벤트</h4>

</body>
</html>
<script>
    console.log('here3...');
 

</script>

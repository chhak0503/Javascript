<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>user1::목록</title>

		<script>
			document.addEventListener('DOMContentLoaded', async function(){

				// 목록 데이터 요청
				const response = await fetch('http://localhost:8080/ch08/user1');
				const data = await response.json();
				console.log(data);

				// 테이블 목록 출력
				const table = document.getElementsByTagName('table')[0];

				for(const user of data){

					const tr = `<tr>
									<td>${user.userid}</td>
									<td>${user.name}</td>
									<td>${user.hp}</td>
									<td>${user.age}</td>
									<td>
										<a href="./modify.html?userid=${user.userid}">수정</a>
										<a href="#">삭제</a>
									</td>
								</tr>`;

					table.insertAdjacentHTML('beforeend', tr);
				}


			});
		</script>
	</head>
	<body>
		<h3>User1 목록</h3>
		<a href="/user1/register.html">등록</a>
		<table border="1">
			<tr>
				<th>아이디</th>
				<th>이름</th>
				<th>생년월일</th>
				<th>나이</th>
				<th>관리</th>
			</tr>
			
		</table>	
	</body>
</html>
